<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Reset Password - AmaliticZ</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --text: #ffffff;
      --muted: #8e8e93;
      --muted2: #48484a;
      --orange:  #f4883a;
      --blue:    #5ab4f5;
      --teal:    #4ecdc4;
      --mint:    #7ed8c0;
      --pink:    #f48fb1;
      --yellow:  #f4c542;
      --magenta: #c966cc;
      --red:     #e8566a;
      --coral:   #e87a5a;
      --sky:     #7ec8e3;
      --radius: 18px;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      background: var(--bg);
      font-family: 'Figtree', sans-serif;
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 18px;
    }

    .wrap {
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* hero */
    .donut-wrap {
      position: relative;
      width: 196px;
      height: 196px;
      margin-bottom: 24px;
      animation: rise 0.65s 0.12s cubic-bezier(.22,1,.36,1) both;
    }

    .donut-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .seg {
      stroke-dasharray: 0 1000;
      animation: draw 1s 0.25s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes draw { to { stroke-dasharray: var(--len) 1000; } }

    .donut-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .logo {
      width: 62px;
      height: 62px;
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
      animation: pop 0.5s 0.55s cubic-bezier(.34,1.56,.64,1) both;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 10px;
      animation: fade-up 0.45s 0.2s both;
    }

    .sub {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 20px;
      animation: fade-up 0.45s 0.3s both;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      animation: fade-up 0.45s 0.38s both;
    }

    .view { display: none; }
    .view.active { display: block; }

    .alert {
      display: none;
      margin-bottom: 12px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .alert.visible { display: block; }

    .alert-error {
      background: rgba(232,86,106,.12);
      border: 1px solid rgba(232,86,106,.25);
      color: #f48fb1;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .pw-wrap {
      position: relative;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 58px 12px 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus { border-color: var(--orange); }

    .toggle-btn {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 6px 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .toggle-btn:hover { color: var(--text); }

    .field-error {
      display: none;
      color: var(--red);
      font-size: 12px;
      margin-top: 6px;
    }

    .field-error.visible { display: block; }

    .cta, .btn-secondary {
      width: 100%;
      display: block;
      border: 0;
      border-radius: var(--radius);
      font-family: 'Figtree', sans-serif;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
    }

    .cta {
      background: #ffffff;
      color: #000000;
      padding: 15px;
      margin-top: 6px;
    }

    .cta:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      padding: 14px;
      margin-top: 10px;
    }

    .cta:active, .btn-secondary:active { transform: scale(.98); }

    .icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 10px;
    }

    .footer {
      margin-top: 26px;
      font-size: 12px;
      color: var(--muted2);
      text-align: center;
      animation: fade-up 0.45s 0.6s both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.55); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
