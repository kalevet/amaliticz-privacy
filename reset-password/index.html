<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --primary:#111;
  --accent:#2563eb;
  --error:#dc2626;
  --success:#16a34a;
  --muted:#6b7280;
  --bg:#f9fafb;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card {
  width:100%;
  max-width:420px;
  background:white;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h1 { margin-bottom:6px; }
p { color:var(--muted); font-size:14px; }

label { font-size:13px; font-weight:500; }

.input-group {
  position:relative;
}

input {
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

.toggle {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:12px;
  color:var(--muted);
  user-select:none;
}

.error-text {
  font-size:12px;
  color:var(--error);
  min-height:16px;
  margin-top:4px;
}

.strength {
  height:6px;
  border-radius:6px;
  background:#eee;
  overflow:hidden;
  margin-top:6px;
}

.strength-bar {
  height:100%;
  width:0%;
  transition:width 0.3s;
}

.checklist {
  font-size:12px;
  margin-top:6px;
}

.checklist div {
  color:var(--muted);
  transition:all 0.2s ease;
}

.checklist .valid {
  color:var(--success);
}

button {
  width:100%;
  padding:12px;
  margin-top:14px;
  border-radius:10px;
  border:none;
  background:var(--primary);
  color:white;
  font-size:16px;
}

button:disabled {
  opacity:0.5;
  cursor:not-allowed;
}

.secondary {
  background:#e5e7eb;
  color:#111;
}

.message { margin-bottom:10px; }
.error { color:var(--error); }
.success { color:var(--success); }

.hidden { display:none; }

.caps {
  font-size:12px;
  color:#f59e0b;
  margin-top:4px;
}
</style>
</head>

<body>
<div class="card">

<h1>Reset your password</h1>
<p>Create a new secure password.</p>

<div id="message" class="message"></div>

<form id="form">

<label>New password</label>
<div class="input-group">
  <input id="password" type="password" autocomplete="new-password" required />
  <span class="toggle" id="togglePassword">Show</span>
</div>

<div class="strength"><div id="strengthBar" class="strength-bar"></div></div>

<div class="checklist">
  <div id="len">✖ At least 8 characters</div>
  <div id="upper">✖ One uppercase letter</div>
  <div id="num">✖ One number</div>
  <div id="special">✖ One special character</div>
</div>

<div id="caps" class="caps hidden">Caps Lock is ON</div>

<label>Confirm password</label>
<div class="input-group">
  <input id="confirm" type="password" autocomplete="new-password" required />
  <span class="toggle" id="toggleConfirm">Show</span>
</div>

<div id="confirmError" class="error-text"></div>

<button id="submitBtn" disabled>Update password</button>

</form>

<div id="successActions" class="hidden">
  <button onclick="openApp()">Open AmaliticZ App</button>
  <button class="secondary" onclick="goToLogin()">Back to Sign In</button>
</div>

</div>

<script>
const SUPABASE_URL="https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON_KEY="YOUR_PUBLIC_ANON_KEY";

const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const passwordEl=document.getElementById("password");
const confirmEl=document.getElementById("confirm");
const submitBtn=document.getElementById("submitBtn");
const strengthBar=document.getElementById("strengthBar");
const confirmError=document.getElementById("confirmError");
const msg=document.getElementById("message");
const form=document.getElementById("form");
const successActions=document.getElementById("successActions");
const caps=document.getElementById("caps");

const len=document.getElementById("len");
const upper=document.getElementById("upper");
const num=document.getElementById("num");
const special=document.getElementById("special");

// --- SHOW / HIDE TOGGLE (FIXED) ---
function attachToggle(toggleEl, inputEl){
  toggleEl.addEventListener("click", () => {
    const isHidden = inputEl.type === "password";
    inputEl.type = isHidden ? "text" : "password";
    toggleEl.textContent = isHidden ? "Hide" : "Show";
    toggleEl.setAttribute("aria-pressed", isHidden);
  });
}

attachToggle(document.getElementById("togglePassword"), passwordEl);
attachToggle(document.getElementById("toggleConfirm"), confirmEl);

// --- CHECKMARK HANDLER ---
function setCheck(el, condition){
  const text = el.textContent.slice(2);
  if(condition){
    el.textContent = "✔ " + text;
    el.classList.add("valid");
  }else{
    el.textContent = "✖ " + text;
    el.classList.remove("valid");
  }
}

// --- STRENGTH ---
function strength(p){
  let s=0;
  if(p.length>=8)s++;
  if(/[A-Z]/.test(p))s++;
  if(/[0-9]/.test(p))s++;
  if(/[^A-Za-z0-9]/.test(p))s++;
  return s;
}

// --- UI UPDATE ---
function updateUI(){
  const p=passwordEl.value;
  const c=confirmEl.value;

  setCheck(len, p.length>=8);
  setCheck(upper, /[A-Z]/.test(p));
  setCheck(num, /[0-9]/.test(p));
  setCheck(special, /[^A-Za-z0-9]/.test(p));

  const s=strength(p);
  strengthBar.style.width=(s*25)+"%";
  const colors=["#dc2626","#f59e0b","#3b82f6","#16a34a"];
  strengthBar.style.background=colors[s-1]||"#eee";

  if(c && p!==c){
    confirmError.textContent="Passwords do not match.";
  } else {
    confirmError.textContent="";
  }

  submitBtn.disabled = !(
    p.length>=8 &&
    /[A-Z]/.test(p) &&
    /[0-9]/.test(p) &&
    /[^A-Za-z0-9]/.test(p) &&
    p===c
  );
}

passwordEl.addEventListener("input", updateUI);
confirmEl.addEventListener("input", updateUI);

// --- CAPS LOCK ---
passwordEl.addEventListener("keyup",(e)=>{
  if(e.getModifierState && e.getModifierState("CapsLock")){
    caps.classList.remove("hidden");
  } else {
    caps.classList.add("hidden");
  }
});

// autofill fix
setTimeout(updateUI,500);

// --- TOKENS ---
function getTokens(){
  const h=window.location.hash.substring(1);
  const p=new URLSearchParams(h);
  return {
    access_token:p.get("access_token"),
    refresh_token:p.get("refresh_token"),
    type:p.get("type")
  };
}

// --- INIT ---
async function init(){
  const {access_token,refresh_token,type}=getTokens();

  if(!access_token||type!=="recovery"){
    show("Invalid or expired link","error");
    form.classList.add("hidden");
    return;
  }

  const {error}=await supabase.auth.setSession({
    access_token,refresh_token
  });

  if(error){
    show("Invalid or expired link","error");
    form.classList.add("hidden");
  }
}

function show(t,type){
  msg.textContent=t;
  msg.className="message "+type;
}

init();

// --- SUBMIT ---
form.addEventListener("submit",async(e)=>{
  e.preventDefault();
  if(submitBtn.disabled)return;

  show("Updating password...","");

  const {error}=await supabase.auth.updateUser({
    password:passwordEl.value
  });

  if(error){
    show(error.message,"error");
    return;
  }

  show("Password updated successfully","success");
  form.classList.add("hidden");
  successActions.classList.remove("hidden");
});

// --- UX ---
passwordEl.focus();

passwordEl.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    confirmEl.focus();
  }
});

// --- DEEP LINK ---
function openApp(){
  const start=Date.now();
  window.location.href="amaliticz://";

  setTimeout(()=>{
    if(Date.now()-start<2000){
      window.location.href="https://www.amaliticz.com";
    }
  },1500);
}

function goToLogin(){
  window.location.href="https://www.amaliticz.com/login";
}
</script>

</body>
</html>
