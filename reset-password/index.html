<script>
  // These placeholders are replaced by GitHub Actions using repository secrets.
  const SUPABASE_URL = "__SUPABASE_URL__";
  const SUPABASE_ANON_KEY = "__SUPABASE_ANON_KEY__";

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const viewForm = document.getElementById("view-form");
  const viewInvalid = document.getElementById("view-invalid");
  const viewSuccess = document.getElementById("view-success");
  const form = document.getElementById("reset-form");
  const pwInput = document.getElementById("password");
  const cfInput = document.getElementById("confirm");
  const btnSubmit = document.getElementById("btn-submit");
  const alertError = document.getElementById("alert-error");
  const pwError = document.getElementById("password-error");
  const cfError = document.getElementById("confirm-error");

  function showView(id) {
    [viewForm, viewInvalid, viewSuccess].forEach(v => v.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function showInvalid(title, body, icon = "🔗") {
    document.getElementById("invalid-icon").textContent = icon;
    document.getElementById("invalid-title").textContent = title;
    document.getElementById("invalid-body").textContent = body;
    showView("view-invalid");
  }

  function showAlert(msg) {
    alertError.textContent = msg;
    alertError.classList.add("visible");
  }

  function clearAlert() {
    alertError.textContent = "";
    alertError.classList.remove("visible");
  }

  function setFieldError(el, msgEl, msg) {
    el.style.borderColor = "var(--red)";
    msgEl.textContent = msg;
    msgEl.classList.add("visible");
  }

  function clearFieldError(el, msgEl) {
    el.style.borderColor = "";
    msgEl.textContent = "";
    msgEl.classList.remove("visible");
  }

  function cleanupUrl() {
    history.replaceState(null, "", window.location.pathname);
  }

  function validateInputs() {
    const ready = pwInput.value.length > 0 && cfInput.value.length > 0;
    btnSubmit.disabled = !ready;
  }

  pwInput.addEventListener("input", () => {
    clearFieldError(pwInput, pwError);
    clearAlert();
    validateInputs();
    if (cfInput.value && cfInput.value !== pwInput.value) {
      setFieldError(cfInput, cfError, "Passwords do not match.");
    } else {
      clearFieldError(cfInput, cfError);
    }
  });

  cfInput.addEventListener("input", () => {
    clearFieldError(cfInput, cfError);
    clearAlert();
    validateInputs();
  });

  async function initRecoverySession() {
    const url = new URL(window.location.href);
    const params = url.searchParams;

    const errorCode = params.get("error_code");
    const errorDesc = params.get("error_description");

    if (errorCode === "otp_expired" || (errorDesc && errorDesc.toLowerCase().includes("expired"))) {
      showInvalid("Link expired", "This password reset link has expired. Please request a new one.", "⏱️");
      return false;
    }

    if (errorCode === "access_denied" || params.get("error")) {
      showInvalid("Link unavailable", "This reset link was already used or is invalid. Request a new one from the app.", "🚫");
      return false;
    }

    // Primary flow: token_hash from email template
    const tokenHash = params.get("token_hash");
    const type = params.get("type");

    if (tokenHash && type === "recovery") {
      const { error } = await sb.auth.verifyOtp({ type: "recovery", token_hash: tokenHash });
      if (error) return false;
      cleanupUrl();
      return true;
    }

    // Optional compatibility: if token provided instead of token_hash
    const token = params.get("token");
    if (token && type === "recovery") {
      const { error } = await sb.auth.verifyOtp({ type: "recovery", token_hash: token });
      if (!error) {
        cleanupUrl();
        return true;
      }
    }

    // Legacy implicit/hash flow fallback
    const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
    if (hash) {
      const hp = {};
      hash.split("&").forEach(pair => {
        const [k, v] = pair.split("=");
        if (k) hp[decodeURIComponent(k)] = decodeURIComponent(v || "");
      });

      if (hp.access_token && hp.refresh_token && hp.type === "recovery") {
        const { error } = await sb.auth.setSession({
          access_token: hp.access_token,
          refresh_token: hp.refresh_token
        });
        if (error) return false;
        cleanupUrl();
        return true;
      }
    }

    // Already has session
    const { data: { session } } = await sb.auth.getSession();
    return !!session;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlert();
    clearFieldError(pwInput, pwError);
    clearFieldError(cfInput, cfError);

    const pw = pwInput.value;
    const cf = cfInput.value;

    let ok = true;
    if (pw.length < 8) {
      setFieldError(pwInput, pwError, "Password must be at least 8 characters.");
      ok = false;
    }
    if (pw !== cf) {
      setFieldError(cfInput, cfError, "Passwords do not match.");
      ok = false;
    }
    if (!ok) return;

    btnSubmit.disabled = true;
    const { error } = await sb.auth.updateUser({ password: pw });

    if (error) {
      btnSubmit.disabled = false;
      showAlert("Could not update password. Please request a new reset link and try again.");
      return;
    }

    await sb.auth.signOut();
    showView("view-success");
  });

  (async () => {
    if (!SUPABASE_URL.includes("supabase.co") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes("__")) {
      showInvalid("Configuration missing", "Reset page is not configured yet. Contact support.", "⚙️");
      return;
    }

    const ready = await initRecoverySession();
    if (ready) {
      showView("view-form");
    } else {
      showInvalid("Link unavailable", "This password reset link is invalid, expired, or already used. Please request a new one.", "🚫");
    }
  })();
</script>
